<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Timothy Dunn</title>
    
    <link rel="icon" type="image/png" href="Images/favicon.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <nav>
        <div class="container nav-container">
            <div class="logo">TD<div class="logo-dot"></div><span>Portfolio</span></div>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="stack.html">Stack</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="gallery.html" class="active shine-effect">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"></circle></svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </nav>

    <main class="page-content">
        <section id="blender-gallery" class="container reveal active">
            <h2 class="section-title">Blender Renders</h2>
            <div class="gallery-grid" id="blenderGrid">
                <!-- Images will be loaded here -->
            </div>
        </section>

        <section id="unity-gallery" class="container reveal" style="margin-top: 8rem;">
            <h2 class="section-title">Unity Assets</h2> 
            <div class="gallery-grid" id="unityGrid">   
                <!-- Images will be loaded via script -->
            </div>
        </section>
    </main>

    <!-- Lightbox Modal Structure -->
    <div id="imageModal" class="lightbox-modal">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightboxImg">
    </div>

    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-link">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="about.html" class="mobile-nav-link">
            <i class="fas fa-user"></i>
            <span>About</span>
        </a>
        <a href="stack.html" class="mobile-nav-link">
            <i class="fas fa-layer-group"></i>
            <span>Stack</span>
        </a>
        <a href="history.html" class="mobile-nav-link">
            <i class="fas fa-history"></i>
            <span>History</span>
        </a>
        <a href="gallery.html" class="mobile-nav-link active">
            <i class="fas fa-images"></i>
            <span>Gallery</span>
        </a>
        <a href="contact.html" class="mobile-nav-link">
            <i class="fas fa-envelope"></i>
            <span>Contact</span>
        </a>
    </nav>

    <footer>
        <p>&copy; 2026 Timothy Dunn Game Development. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // --- Lightbox Logic ---
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("lightboxImg");
        const closeSpan = document.querySelector(".close-lightbox");

        function openModal(src) {
            modal.style.display = "flex"; 
            modalImg.src = src;
        }

        // Close when clicking the X
        closeSpan.onclick = function() { 
            modal.style.display = "none";
        }

        // Close when clicking outside the image
        modal.onclick = function(event) {
            if (event.target === modal) {
                modal.style.display = "none";
            }
        }

        // Load Blender Renders dynamically
        const blenderImages = [
            'Pills.png',
            'Edge.png',
            'Pinch.png',
            'Ring.png',
            'Royal.png',
            'Tome.png',
            'Autumn.png',
            'Bell.png',
            'Box.png',
            'Breakfast.png',
            'Camp.png',
            'ChildHoodToy_Lego.png',
            'Flower.png',
            'Frame.png',
            'Glass.png',
            'Headphones.png',
            'Ink.png',
            'LampDenoised.png',
            'LighthouseDawnHighQual.png',
            'Lost Hat.png',
            'Map.png',
            'Moon Pic.png',
            'Portal.png',
            'Robot1.png',
            'Spaceship1.png',
            'SpoonSpoonSpoon.jpg',
            'SuperNova.png',
            'Swing.png',
            'Wire-Somewhere_Cold.png'
        ];

        const blenderGrid = document.getElementById('blenderGrid');
        
        blenderImages.forEach((imageName, index) => {
            const galleryItem = document.createElement('div');
            galleryItem.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.src = `Images/Blender Renders/${imageName}`;
            img.alt = imageName.replace(/\.(png|jpg)$/, '');
            img.loading = 'lazy';
            
            // Add click event for Lightbox
            img.onclick = function() {
                openModal(this.src);
            };
            
            galleryItem.appendChild(img);
            blenderGrid.appendChild(galleryItem);
        });

        // Load Unity Assets dynamically
        const unityImages = [
            'Ruins & Modular Building Parts Pack - Cover.png',
            'MedievalBuildingParts_claypartsr.png',
            'MedievalBuildingParts_fullpackrender_1.png',
            'MedievalBuildingParts_stoneparts.png',
            'MedievalBuildingParts_woodpartsplus.png',
            'MedievalBuildingParts_woodpartsr.png',
            'Render_01.png',
            'Render_02.png',
            'Render_03.png',
            'Render_04.png',
            'Render_05.png',    
            'Render_06.png',
            'Render_07.png',
            'Render_08.png',
            'Render_09.png',
            'Render_10.png',
            'Render_11.png',
            'Render_12.png',
            'Render_13.png',
            'Render_14.png',
            'Render_15.png',
            'Render_16.png',
            'Render_17.png',
            'Render_PurplePortal.png'
        ];

        const unityGrid = document.getElementById('unityGrid');

        unityImages.forEach((imageName, index) => {
            const galleryItem = document.createElement('div');
            galleryItem.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.src = `Images/Unity Assets/${imageName}`;
            img.alt = imageName.replace(/\.(png|jpg|jpeg)$/i, '');
            img.loading = 'lazy';
            
            // Add click event for Lightbox
            img.onclick = function() {
                openModal(this.src);
            };
            
            galleryItem.appendChild(img);
            unityGrid.appendChild(galleryItem);
        });
    </script>
</body>
</html>
