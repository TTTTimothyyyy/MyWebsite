</head>
<body>

    <nav>
        <div class="container nav-container">
            <div class="logo">TD<div class="logo-dot"></div><span>Portfolio</span></div>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="stack.html">Stack</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="gallery.html" class="active shine-effect">Gallery</a></li>
                <li><a href="demos.html">Demos</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"></circle></svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </nav>

    <main class="page-content">
        
        <!-- Filter Buttons -->
        <section class="container reveal active" style="text-align: center;">
            <h1 class="section-title" style="margin-bottom: 1rem;">Asset Gallery</h1>
            <p style="margin-bottom: 2rem; color: var(--text-secondary);">A collection of my 3D renders and game assets.</p>
            
            <div class="gallery-filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="blender">Blender Renders</button>
                <button class="filter-btn" data-filter="unity">Unity Assets</button>
            </div>
        </section>

        <!-- Unified Gallery Grid -->
        <section class="container">
            <div class="gallery-grid" id="mainGalleryGrid">
                <!-- Javascript will combine images here -->
            </div>
        </section>

    </main>

    <!-- Lightbox Modal Structure -->
    <div id="imageModal" class="lightbox-modal">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightboxImg">
    </div>

    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-link">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="about.html" class="mobile-nav-link">
            <i class="fas fa-user"></i>
            <span>About</span>
        </a>
        <a href="stack.html" class="mobile-nav-link">
            <i class="fas fa-layer-group"></i>
            <span>Stack</span>
        </a>
        <a href="history.html" class="mobile-nav-link">
            <i class="fas fa-history"></i>
            <span>History</span>
        </a>
        <a href="gallery.html" class="mobile-nav-link active">
            <i class="fas fa-images"></i>
            <span>Gallery</span>
        </a>
        <a href="demos.html" class="mobile-nav-link">
            <i class="fas fa-gamepad"></i>
            <span>Demos</span>
        </a>
        <a href="contact.html" class="mobile-nav-link">
            <i class="fas fa-envelope"></i>
            <span>Contact</span>
        </a>
    </nav>

    <footer>
        <p>&copy; 2026 Timothy Dunn Game Development. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // --- Lightbox Logic ---
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("lightboxImg");
        const closeSpan = document.querySelector(".close-lightbox");

        function openModal(src) {
            modal.style.display = "flex"; 
            modalImg.src = src;
        }

        closeSpan.onclick = function() { modal.style.display = "none"; }
        modal.onclick = function(event) { if (event.target === modal) modal.style.display = "none"; }

        // --- Data Definitions ---
        const blenderImages = [
            'Pills.png', 'Edge.png', 'Pinch.png', 'Ring.png', 'Royal.png', 'Tome.png',
            'Autumn.png', 'Bell.png', 'Box.png', 'Breakfast.png', 'Camp.png',
            'ChildHoodToy_Lego.png', 'Flower.png', 'Frame.png', 'Glass.png',
            'Headphones.png', 'Ink.png', 'LampDenoised.png', 'LighthouseDawnHighQual.png',
            'Lost Hat.png', 'Map.png', 'Moon Pic.png', 'Portal.png', 'Robot1.png',
            'Spaceship1.png', 'SpoonSpoonSpoon.jpg', 'SuperNova.png', 'Swing.png',
            'Wire-Somewhere_Cold.png'
        ];

        const unityImages = [
            'Ruins & Modular Building Parts Pack - Cover.png',
            'MedievalBuildingParts_claypartsr.png',
            'MedievalBuildingParts_fullpackrender_1.png',
            'MedievalBuildingParts_stoneparts.png',
            'MedievalBuildingParts_woodpartsplus.png',
            'MedievalBuildingParts_woodpartsr.png',
            'Render_01.png', 'Render_02.png', 'Render_03.png',  
            'Render_06.png', 'Render_10.png',
        ];

        const mainGrid = document.getElementById('mainGalleryGrid');

        // Helper function to create gallery items
        function createGalleryItem(filename, category, folder) {
            const item = document.createElement('div');
            item.className = `gallery-item show`; 
            item.setAttribute('data-category', category); // Store category for filtering

            const img = document.createElement('img');
            img.src = `Images/${folder}/${filename}`;
            img.alt = filename.replace(/\.(png|jpg|jpeg)$/i, '');
            img.loading = 'lazy';
            
            // Lightbox click
            img.onclick = function() { openModal(this.src); };

            item.appendChild(img);
            return item;
        }

        // Populate Grid
        // 1. Add Blender Images
        blenderImages.forEach(img => {
            mainGrid.appendChild(createGalleryItem(img, 'blender', 'Blender Renders'));
        });

        // 2. Add Unity Images
        unityImages.forEach(img => {
            mainGrid.appendChild(createGalleryItem(img, 'unity', 'Unity Assets'));
        });

        // --- Filter Logic ---
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryItems = document.querySelectorAll('.gallery-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all buttons
                filterBtns.forEach(b => b.classList.remove('active'));
                // Add active class to clicked button
                btn.classList.add('active');

                const filterValue = btn.getAttribute('data-filter');

                galleryItems.forEach(item => {
                    if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                        item.classList.remove('hide');
                        item.classList.add('show');
                    } else {
                        item.classList.remove('show');
                        item.classList.add('hide');
                    }
                });
            });
        });

    </script>
</body>
</html>
